name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan_ruby:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bundle exec brakeman --no-pager

  lint:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint Ruby code for consistent style
        run: bundle exec rubocop -f github

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Lint frontend
        run: npm run lint -- --no-fix
        working-directory: ui

  test:
    runs-on: self-hosted

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y build-essential git libpq-dev libyaml-dev pkg-config

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
        run: bin/rails db:test:prepare && bundle exec rspec

  build-and-deploy:
    runs-on: self-hosted
    needs: [test, lint, scan_ruby]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: docker build -t nas.malfin.com:10100/budgeting2-api:${{ steps.tag.outputs.TAG }} -f Dockerfile.api .

      - name: Build UI image
        run: docker build -t nas.malfin.com:10100/budgeting2-ui:${{ steps.tag.outputs.TAG }} -f Dockerfile.ui .

      - name: Push API image
        run: docker push nas.malfin.com:10100/budgeting2-api:${{ steps.tag.outputs.TAG }}

      - name: Push UI image
        run: docker push nas.malfin.com:10100/budgeting2-ui:${{ steps.tag.outputs.TAG }}

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: layla.malfin.com
          username: griffin
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sed -i 's|^BUDGETING_API_IMAGE=.*|BUDGETING_API_IMAGE=nas.malfin.com:10100/budgeting2-api:${{ steps.tag.outputs.TAG }}|' /home/griffin/docker/.env
            sed -i 's|^BUDGETING_UI_IMAGE=.*|BUDGETING_UI_IMAGE=nas.malfin.com:10100/budgeting2-ui:${{ steps.tag.outputs.TAG }}|' /home/griffin/docker/.env
            cd /home/griffin/docker
            docker compose pull budgeting-api budgeting2-ui
            docker compose up -d budgeting-api budgeting2-ui
