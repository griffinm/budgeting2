production:
  daily_report_email:
    class: DailyReportEmailJob
    queue: default
    schedule: "0 7 * * *"
    time_zone: "America/New_York"
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  daily_report_email:
    class: DailyReportEmailJob
    queue: default
    schedule: "0 7 * * *"
    time_zone: "America/New_York"
